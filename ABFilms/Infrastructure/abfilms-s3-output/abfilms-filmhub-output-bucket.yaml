AWSTemplateFormatVersion: '2010-09-09'
Description: S3 Template to create S3 Bucket for outputs

Parameters:

  S3BucketSuffix:
    Description: name added to the s3 bucket
    Type: String 

Resources:

  FilmHubOutputBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketName: !Sub "abfilms-${AWS::Region}-${AWS::AccountId}-${S3BucketSuffix}"
      Tags:
        - Key: Name
          Value: !Sub "abfilms-${AWS::Region}-${AWS::AccountId}-${S3BucketSuffix}"

Outputs:

  BucketName:
    Description: The name of the created S3 bucket.
    Value: !Ref FilmHubOutputBucket

  BucketArn:
    Description: The  Arn of the created S3 bucket.
    Value: !GetAtt FilmHubOutputBucket.Arn