AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: SAM Project to deploy mediaconvert resources

Parameters:

  Identifier:
    Description: name added to resources
    Type: String

  Environment:
    Description: name
    Type: String

Conditions:
  IsDev: !Equals [!Ref Environment, "dev"]

Resources:

  ShowsHLSJobTemplate:
    Type: AWS::MediaConvert::JobTemplate
    Properties:
      Name: !Sub "abfilms-${Identifier}-${Environment}-shows-hls-ladder"
      SettingsJson:
        OutputGroups:
          - Name: "HLS Group"
            OutputGroupSettings:
              Type: HLS_GROUP_SETTINGS
              HlsGroupSettings:
                SegmentLength: 6
                MinSegmentLength: 0
                Destination: "s3://placeholder/outputs/"
            Outputs:
              # --- 1. 1080p High Quality ---
              - ContainerSettings:
                  Container: M3U8 # Changed from M2TS to M3U8 for HLS Group
                NameModifier: "_1080p" # Required to distinguish files
                AudioDescriptions:
                  - AudioSourceName: "Audio Selector 1"
                    CodecSettings:
                      Codec: AAC
                      AacSettings:
                        Bitrate: 160000
                        CodingMode: CODING_MODE_2_0 
                        SampleRate: 48000
                VideoDescription:
                  Width: 1920
                  Height: 1080
                  CodecSettings:
                    Codec: H_264
                    H264Settings:
                      MaxBitrate: 5000000 
                      RateControlMode: QVBR
                      QvbrSettings:
                        QvbrQualityLevel: 8
                      GopSize: 2
                      SceneChangeDetect: ENABLED
                OutputSettings:
                  HlsSettings:
                    AudioGroupId: "program_audio" # Standard practice for HLS

              # --- 2. 720p Mid Quality ---
              - ContainerSettings:
                  Container: M3U8
                NameModifier: "_720p"
                AudioDescriptions:
                  - AudioSourceName: "Audio Selector 1"
                    CodecSettings:
                      Codec: AAC
                      AacSettings:
                        Bitrate: 128000
                        # FIXED: Standard stereo mode for better compatibility
                        CodingMode: CODING_MODE_2_0
                        SampleRate: 48000
                VideoDescription:
                  Width: 1280
                  Height: 720
                  CodecSettings:
                    Codec: H_264
                    H264Settings:
                      MaxBitrate: 3000000 
                      RateControlMode: QVBR
                      QvbrSettings:
                        QvbrQualityLevel: 7
                      GopSize: 2
                OutputSettings:
                  HlsSettings:
                    AudioGroupId: "program_audio"

              # --- 3. 480p Low Quality ---
              - ContainerSettings:
                  Container: M3U8
                NameModifier: "_480p"
                AudioDescriptions:
                  - AudioSourceName: "Audio Selector 1"
                    CodecSettings:
                      Codec: AAC
                      AacSettings:
                        Bitrate: 96000
                        # FIXED: Standard stereo mode
                        CodingMode: CODING_MODE_2_0
                        SampleRate: 48000
                VideoDescription:
                  Width: 854
                  Height: 480
                  CodecSettings:
                    Codec: H_264
                    H264Settings:
                      MaxBitrate: 1000000 
                      RateControlMode: QVBR
                      QvbrSettings:
                        QvbrQualityLevel: 6
                      GopSize: 2
                OutputSettings:
                  HlsSettings:
                    AudioGroupId: "program_audio"

  MoviesHLSJobTemplate:
    Type: AWS::MediaConvert::JobTemplate
    Properties:
      Name: !Sub "abfilms-${Identifier}-${Environment}-movies-hls-ladder"
      SettingsJson:
        OutputGroups:
          - Name: "HLS Group"
            OutputGroupSettings:
              Type: HLS_GROUP_SETTINGS
              HlsGroupSettings:
                SegmentLength: 6
                MinSegmentLength: 0
                Destination: "s3://placeholder/outputs/"
            Outputs:
              # --- 1. 1080p High Quality ---
              - ContainerSettings:
                  Container: M3U8 # Changed from M2TS to M3U8 for HLS Group
                NameModifier: "_1080p" # Required to distinguish files
                AudioDescriptions:
                  - AudioSourceName: "Audio Selector 1"
                    CodecSettings:
                      Codec: AAC
                      AacSettings:
                        Bitrate: 160000
                        CodingMode: CODING_MODE_2_0
                        SampleRate: 48000
                        CodecProfile: LC
                        RateControlMode: CBR
                VideoDescription:
                  Width: 1920
                  Height: 1080
                  CodecSettings:
                    Codec: H_264
                    H264Settings:
                      MaxBitrate: 5000000 
                      RateControlMode: QVBR
                      QvbrSettings:
                        QvbrQualityLevel: 8
                      GopSize: 2
                      SceneChangeDetect: ENABLED
                OutputSettings:
                  HlsSettings:
                    AudioGroupId: "program_audio" # Standard practice for HLS

              # --- 2. 720p Mid Quality ---
              - ContainerSettings:
                  Container: M3U8
                NameModifier: "_720p"
                AudioDescriptions:
                  - AudioSourceName: "Audio Selector 1"
                    CodecSettings:
                      Codec: AAC
                      AacSettings:
                        Bitrate: 128000
                        # FIXED: Standard stereo mode for better compatibility
                        CodingMode: CODING_MODE_2_0
                        SampleRate: 48000
                VideoDescription:
                  Width: 1280
                  Height: 720
                  CodecSettings:
                    Codec: H_264
                    H264Settings:
                      MaxBitrate: 3000000 
                      RateControlMode: QVBR
                      QvbrSettings:
                        QvbrQualityLevel: 7
                      GopSize: 2
                OutputSettings:
                  HlsSettings:
                    AudioGroupId: "program_audio"

              # --- 3. 480p Low Quality ---
              - ContainerSettings:
                  Container: M3U8
                NameModifier: "_480p"
                AudioDescriptions:
                  - AudioSourceName: "Audio Selector 1"
                    CodecSettings:
                      Codec: AAC
                      AacSettings:
                        Bitrate: 96000
                        # FIXED: Standard stereo mode
                        CodingMode: CODING_MODE_2_0
                        SampleRate: 48000
                VideoDescription:
                  Width: 854
                  Height: 480
                  CodecSettings:
                    Codec: H_264
                    H264Settings:
                      MaxBitrate: 1000000 
                      RateControlMode: QVBR
                      QvbrSettings:
                        QvbrQualityLevel: 6
                      GopSize: 2
                OutputSettings:
                  HlsSettings:
                    AudioGroupId: "program_audio"

Outputs:
  MoviesJobTemplate:
    Value: !GetAtt MoviesHLSJobTemplate.Arn

  ShowsJobTemplate:
    Value: !GetAtt ShowsHLSJobTemplate.Arn
