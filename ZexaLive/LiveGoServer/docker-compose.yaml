services:
  dashboard:
    build:
      # The context is the directory containing the dashboard files
      context: ./livego-dashboard
      # The name of the Dockerfile inside that context
      dockerfile: Dockerfile
    container_name: livego-dashboard
    ports:
      - "3000:3000"
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  livego:
    #image: gwuhaolin/livego
    build:
      # The context is the directory containing the dashboard files
      context: ./livego-server
      # The name of the Dockerfile inside that context
      dockerfile: Dockerfile
    container_name: livego_server
    command: ["--hls_keep_after_end"]
    restart: always
    ports:
      - "1935:1935"
      - "8090:8090"
      - "7001:7001"
      - "7002:7002"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:alpine
    container_name: redis_server
    restart: always
    ports:
      - "6379:6379"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis-monitor:
    image: rediscommander/redis-commander:latest
    container_name: redis-commander
    restart: always
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis