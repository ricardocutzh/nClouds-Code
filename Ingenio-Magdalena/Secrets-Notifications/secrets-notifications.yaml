AWSTemplateFormatVersion: '2010-09-09'
Description: Human Access Monitor for Secrets Manager (Lambda Inspector Version)

Parameters:
  Environment:
    Type: String
    Default: dev
  Identifier:
    Type: String
  EmailAddress1:
    Type: String
  EmailAddress2:
    Type: String
  SecretNameArn:
    Type: String
  SecretNameArn2:
    Type: String

Resources:
  # 1. SNS Topic for the final alert
  AccessNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "imsa-${Identifier}-${Environment}-alert-topic"
      Subscription:
        - Endpoint: !Ref EmailAddress1
          Protocol: email
        - Endpoint: !Ref EmailAddress2
          Protocol: email

  # 2. Lambda Function (The Inspector)
  SecretInspectorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "imsa-${Identifier}-${Environment}-secret-inspector"
      Handler: index.lambda_handler
      Runtime: python3.12
      Role: !GetAtt InspectorExecutionRole.Arn
      Environment:
        Variables:
          SNS_TOPIC_ARN: !Ref AccessNotificationTopic
      Code:
        ZipFile: |
          import boto3
          import json
          import os

          sns = boto3.client('sns')

          def lambda_handler(event, context):
              detail = event.get('detail', {})
              user_identity = detail.get('userIdentity', {})
              user_type = user_identity.get('type')
              
              # Extract username or role name
              principal_id = user_identity.get('principalId', 'Unknown')
              
              # SSO/Identity Center users always have 'AWSReservedSSO' in their session context
              session_issuer = user_identity.get('sessionContext', {}).get('sessionIssuer', {})
              user_name = session_issuer.get('userName', '')

              # LOGIC: Is this a human?
              is_sso_human = user_type == "AssumedRole" and user_name.startswith("AWSReservedSSO")
              is_iam_user = user_type == "IAMUser"

              if is_sso_human or is_iam_user:
                  message = (
                      f"ALERTA DE SEGURIDAD\n\n"
                      f"Secreto: {detail['requestParameters']['secretId']}\n"
                      f"Usuario: {principal_id}\n"
                      f"Hora: {event['time']}\n"
                      f"Origen: {detail.get('sourceIPAddress', 'N/A')}\n"
                      f"UserAgent: {detail.get('userAgent', 'N/A')}"
                  )
                  
                  sns.publish(
                      TopicArn=os.environ['SNS_TOPIC_ARN'],
                      Subject="Acceso A Secreto Detectado",
                      Message=message
                  )
                  print(f"Alert sent for human user: {principal_id}")
              else:
                  print(f"Access ignored for non-human entity: {user_type}")

  # 3. IAM Role for the Inspector
  InspectorExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InspectorPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sns:Publish
                Resource: !Ref AccessNotificationTopic
              - Effect: Allow
                Action: logs:CreateLogGroup
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*"
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/imsa-${Identifier}-${Environment}-secret-inspector:*"

  # 4. EventBridge Rule (The Trigger)
  SecretEventTrigger:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${Identifier}-${Environment}-trigger-inspector"
      State: ENABLED_WITH_ALL_CLOUDTRAIL_MANAGEMENT_EVENTS
      EventPattern:
        source:
          - "aws.secretsmanager"
        detail-type:
          - "AWS API Call via CloudTrail"
        detail:
          eventSource:
            - "secretsmanager.amazonaws.com"
          eventName:
            - "GetSecretValue"
          requestParameters:
            secretId:
              - !Ref SecretNameArn
              - !Ref SecretNameArn2
      Targets:
        - Arn: !GetAtt SecretInspectorFunction.Arn
          Id: "InspectorLambdaTarget"

  # 5. Permission for EventBridge to call Lambda
  PermissionForEventsToInvokeLambda:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref SecretInspectorFunction
      Action: "lambda:InvokeFunction"
      Principal: "events.amazonaws.com"
      SourceArn: !GetAtt SecretEventTrigger.Arn

Outputs:
  InspectorLambda:
    Value: !Ref SecretInspectorFunction